services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    ports:
      # Host-side port is per-server — override via FRONTEND_HOST_PORT in
      # this folder's .env. 4001 was the first shared staging server's
      # fresh block (confirmed free, opened at ufw + cloud firewall); a
      # second server with different ports already taken sets its own
      # value. Container-internal port stays 3000 (next start -p 3000).
      - "${FRONTEND_HOST_PORT:-4001}:3000"
