services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: message_hub
      POSTGRES_PASSWORD: message_hub
      POSTGRES_DB: message_hub
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U message_hub"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    environment:
      # Internal docker network hostnames/ports — overrides the host-mode
      # dev values (localhost:5435/6379) from .env, which only make sense
      # when the app runs directly on the host.
      DATABASE_URL: postgres://message_hub:message_hub@postgres:5432/message_hub
      REDIS_HOST: redis
      REDIS_PORT: 6379
      API_PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgres://message_hub:message_hub@postgres:5432/message_hub
      REDIS_HOST: redis
      REDIS_PORT: 6379
      API_PORT: 3001
      # mock adapter's simulated async callback POSTs back to the API's
      # webhook route — from inside the worker container that's the api
      # service's internal DNS name, not localhost.
      WEBHOOK_BASE_URL: http://api:3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started

volumes:
  postgres_data:
