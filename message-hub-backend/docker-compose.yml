services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: message_hub
      POSTGRES_PASSWORD: message_hub
      POSTGRES_DB: message_hub
    ports:
      # Host-side port is per-server (different shared staging boxes have
      # different ports already taken by other apps) — override via
      # POSTGRES_HOST_PORT in this folder's .env, default matches the
      # original single-server value.
      - "${POSTGRES_HOST_PORT:-5435}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U message_hub"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      # See POSTGRES_HOST_PORT note above — override via REDIS_HOST_PORT.
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      network: host
    env_file: .env
    environment:
      # Internal docker network hostnames/ports — overrides the host-mode
      # dev values (localhost:5435/6379) from .env, which only make sense
      # when the app runs directly on the host.
      DATABASE_URL: postgres://message_hub:message_hub@postgres:5432/message_hub
      REDIS_HOST: redis
      REDIS_PORT: 6379
      API_PORT: 3001
    ports:
      # Host-side port is per-server — override via API_HOST_PORT in this
      # folder's .env. 4011 was the first shared staging server's fresh
      # block (confirmed free, opened at ufw + cloud firewall); a second
      # server with different ports already taken sets its own value.
      # Container-internal port stays 3001 (API_PORT above).
      - "${API_HOST_PORT:-4011}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
      network: host
    env_file: .env
    environment:
      DATABASE_URL: postgres://message_hub:message_hub@postgres:5432/message_hub
      REDIS_HOST: redis
      REDIS_PORT: 6379
      API_PORT: 3001
      # mock adapter's simulated async callback POSTs back to the API's
      # webhook route — from inside the worker container that's the api
      # service's internal DNS name, not localhost.
      WEBHOOK_BASE_URL: http://api:3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started

volumes:
  postgres_data:
